---
- name: Configure EC2
  hosts: servers
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose-v2
        state: present

    - name: Enable and start Docker
      service:
        name: docker
        enabled: yes
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset SSH connection to apply docker group
      meta: reset_connection

    - name: Build and start application
      command: docker compose up -d --build
      args:
        chdir: /home/ubuntu/app

    - name: Wait for backend container
      shell: docker inspect --format='{{.State.Health.Status}}' backend
      register: backend_health
      retries: 30
      delay: 5
      until: backend_health.stdout == "healthy"

    - name: Restart nginx
      command: docker compose restart nginx
      args:
        chdir: /home/ubuntu/app

    - name: Wait for API to become available
      uri:
        url: http://localhost/api/users
        status_code: 200
      register: result
      retries: 20
      delay: 5
      until: result.status == 200

    - name: Display deployment status
      debug:
        msg: "Application deployed successfully!"

