name: Terraform + Ansible + Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    defaults:
      run:
        working-directory: terraform

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: tf
        run: |
          echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Generate Inventory
        run: |
          cat <<EOF > ../ansible/inventory.ini
          [servers]
          ${{ steps.tf.outputs.ip }} ansible_user=ubuntu
          EOF

      - name: Wait for SSH
        run: |
          until ssh \
            -o StrictHostKeyChecking=no \
            -i key.pem \
            ubuntu@${{ steps.tf.outputs.ip }} \
            "echo 'EC2 Ready'"
          do
            echo "Waiting for EC2..."
            sleep 10
          done

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible rsync

      - name: Copy Application to EC2
        run: |
          rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -i key.pem" \
            ../app/ \
            ubuntu@${{ steps.tf.outputs.ip }}:/home/ubuntu/app/

      - name: Run Ansible Playbook
        run: |
          ansible-playbook \
            -i ../ansible/inventory.ini \
            ../ansible/playbook.yml \
            --private-key key.pem

      - name: Verify Deployment
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i key.pem \
            ubuntu@${{ steps.tf.outputs.ip }} \
            "docker ps"
