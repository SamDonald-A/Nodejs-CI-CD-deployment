services:

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"
    environment:
      MONGO_URL: mongodb://mongodb:27017/sam-app-db

    depends_on:
      mongodb:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/users"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    volumes:
      - mongo-data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  mongo-data: