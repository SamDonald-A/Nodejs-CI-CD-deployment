version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "80"

  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"
    environment:
      MONGO_URL: mongodb://mongodb:27017/sam-app-db
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: mongodb
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data: